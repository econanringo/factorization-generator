<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>因数分解 問題演習</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
  />
  <script
    defer
    src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
  ></script>
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #1f2937;
      --sub: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --ok: #047857;
      --ng: #b91c1c;
      --line: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.2rem, 2vw, 1.6rem);
    }

    .desc { color: var(--sub); margin: 0 0 16px; }

    .panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 14px;
      background: #fcfdff;
    }

    .equation {
      min-height: 38px;
      font-size: 1.1rem;
      overflow-x: auto;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      transition: background .2s ease;
    }

    button:hover { background: var(--primary-dark); }

    .kbd {
      background: #eef2ff;
      color: #1e3a8a;
      font-weight: 600;
      min-width: 44px;
      padding: 10px;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: 700;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
    }

    .preview, .feedback, .answer {
      min-height: 30px;
      margin-top: 8px;
      overflow-x: auto;
    }

    .feedback.ok { color: var(--ok); font-weight: 700; }
    .feedback.ng { color: var(--ng); font-weight: 700; }

    @media (max-width: 560px) {
      .app { padding: 14px; }
      button { flex: 1 1 auto; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>因数分解 問題演習</h1>
    <p class="desc">ランダム問題を解いて、数式プレビューで確認してから答え合わせできます。</p>

    <section class="panel">
      <strong>問題</strong>
      <div id="questionLatex" class="equation"></div>
      <div class="controls">
        <button id="nextProblemBtn" type="button">次の問題を生成</button>
      </div>
    </section>

    <section class="panel">
      <label for="answerInput">解答入力（例: (x+2)(x+3), (x+2)^2）</label>
      <input id="answerInput" type="text" autocomplete="off" />
      <div class="controls" id="softKeyboard">
        <button type="button" class="kbd" data-insert="x">x</button>
        <button type="button" class="kbd" data-insert="y">y</button>
        <button type="button" class="kbd" data-insert="+">+</button>
        <button type="button" class="kbd" data-insert="-">-</button>
        <button type="button" class="kbd" data-insert="(">(</button>
        <button type="button" class="kbd" data-insert=")">)</button>
        <button type="button" class="kbd" data-insert="^2">^2</button>
      </div>

      <div class="controls">
        <button id="previewBtn" type="button">プレビュー</button>
        <button id="checkBtn" type="button">答え合わせ</button>
      </div>

      <strong>入力プレビュー</strong>
      <div id="previewLatex" class="preview"></div>
      <div id="feedback" class="feedback"></div>
      <strong>正しい解答</strong>
      <div id="correctLatex" class="answer"></div>
    </section>
  </main>

  <script>
    const questionLatex = document.getElementById("questionLatex");
    const answerInput = document.getElementById("answerInput");
    const previewLatex = document.getElementById("previewLatex");
    const feedback = document.getElementById("feedback");
    const correctLatex = document.getElementById("correctLatex");

    const state = { current: null };

    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const pickNonZero = (min, max) => {
      let n = 0;
      while (n === 0) n = randInt(min, max);
      return n;
    };

    const numToLatex = (n) => (n < 0 ? `(${n})` : `${n}`);
    const signed = (n) => (n >= 0 ? `+${n}` : `${n}`);

    // 4種類のパターンをランダム生成し、表示式と正解式（LaTeX）を保持する
    function generateProblem() {
      const type = randInt(1, 4);

      if (type === 1) {
        const a = pickNonZero(-8, 8);
        const b = pickNonZero(-8, 8);
        const B = a + b;
        const C = a * b;
        state.current = {
          type,
          A: 1, B, C,
          question: `x^2 ${signed(B)}x ${signed(C)}`,
          answerLatex: `(x${signed(a)})(x${signed(b)})`
        };
      } else if (type === 2) {
        const a = pickNonZero(-9, 9);
        state.current = {
          type,
          A: 1, B: 2 * a, C: a * a,
          question: `x^2 ${signed(2 * a)}x ${signed(a * a)}`,
          answerLatex: `(x${signed(a)})^2`
        };
      } else if (type === 3) {
        const a = pickNonZero(1, 12);
        state.current = {
          type,
          A: 1, B: 0, C: -(a * a),
          question: `x^2 ${signed(-(a * a))}`,
          answerLatex: `(x+${a})(x-${a})`
        };
      } else {
        // たすき掛けを意識した ax^2+bx+c を、整数因数 (px+q)(rx+s) から生成
        const p = pickNonZero(1, 5);
        const r = pickNonZero(1, 5);
        const q = pickNonZero(-8, 8);
        const s = pickNonZero(-8, 8);
        const A = p * r;
        const B = p * s + q * r;
        const C = q * s;
        state.current = {
          type,
          A, B, C,
          question: `${A === 1 ? "" : A}x^2 ${signed(B)}x ${signed(C)}`,
          answerLatex: `(${p === 1 ? "" : p + ""}x${signed(q)})(${r === 1 ? "" : r + ""}x${signed(s)})`
        };
      }

      renderLatex(questionLatex, state.current.question);
      feedback.textContent = "";
      feedback.className = "feedback";
      correctLatex.textContent = "";
      answerInput.value = "";
      previewLatex.textContent = "";
      answerInput.focus();
    }

    function renderLatex(el, latexText) {
      if (!window.katex) {
        el.textContent = latexText;
        return;
      }
      try {
        window.katex.render(latexText, el, { throwOnError: false });
      } catch {
        el.textContent = latexText;
      }
    }

    // 判定ロジック:
    // 入力式を安全に整形して数値評価し、問題多項式 A*x^2+B*x+C と複数点で一致するか確認
    // これにより (x+2)(x+3) と (x+3)(x+2) の順序違いも正解扱いにできる
    function normalizeForEval(input) {
      let expr = (input || "").trim().replaceAll("²", "^2");
      if (!expr) return "";
      if (!/^[0-9xXyY+\-*/^().\s]+$/.test(expr)) return "";
      expr = expr.toLowerCase().replaceAll("y", "x").replace(/\s+/g, "");

      // 暗黙の掛け算を補完: 2x, x(, )(, )x, x2 など
      expr = expr
        .replace(/(\d)([x(])/g, "$1*$2")
        .replace(/([x)])(\d)/g, "$1*$2")
        .replace(/([x)])([x(])/g, "$1*$2");

      expr = expr.replaceAll("^", "**");
      return expr;
    }

    function isCorrectAnswer(input) {
      if (!state.current) return false;
      const expr = normalizeForEval(input);
      if (!expr) return false;

      try {
        const fn = new Function("x", `return (${expr});`);
        const points = [-5, -2, -1, 0, 1, 3, 5];
        return points.every((x) => {
          const left = fn(x);
          const right = state.current.A * x * x + state.current.B * x + state.current.C;
          return Number.isFinite(left) && Math.abs(left - right) < 1e-9;
        });
      } catch {
        return false;
      }
    }

    function updatePreview() {
      const txt = answerInput.value.trim();
      if (!txt) {
        previewLatex.textContent = "";
        return;
      }
      renderLatex(previewLatex, txt.replaceAll("²", "^2"));
    }

    document.getElementById("nextProblemBtn").addEventListener("click", generateProblem);
    document.getElementById("previewBtn").addEventListener("click", updatePreview);
    document.getElementById("checkBtn").addEventListener("click", () => {
      const ok = isCorrectAnswer(answerInput.value);
      feedback.textContent = ok ? "正解！🎉" : "残念！不正解です";
      feedback.className = ok ? "feedback ok" : "feedback ng";
      renderLatex(correctLatex, state.current.answerLatex);
    });

    document.getElementById("softKeyboard").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-insert]");
      if (!btn) return;
      const insert = btn.dataset.insert || "";
      const start = answerInput.selectionStart ?? answerInput.value.length;
      const end = answerInput.selectionEnd ?? answerInput.value.length;
      const oldVal = answerInput.value;
      answerInput.value = oldVal.slice(0, start) + insert + oldVal.slice(end);
      const caret = start + insert.length;
      answerInput.focus();
      answerInput.setSelectionRange(caret, caret);
      updatePreview();
    });

    answerInput.addEventListener("input", updatePreview);
    generateProblem();
  </script>
</body>
</html>
